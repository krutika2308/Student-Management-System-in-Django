{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>

    <link rel="stylesheet" href="{% static 'css/navbar_page.css' %}">
    <link rel="stylesheet" href="{% static 'css/update.css' %}">
</head>

<body>

{% include "navbar.html" %}

<div class="form-container">
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <h2>Update Student</h2>

    <label>Name</label>
    <input type="text" name="name" value="{{ student.name }}">

    <label>Age</label>
    <input type="number" name="age" value="{{ student.age }}">

    <label>Description</label>
    <textarea name="description">{{ student.description }}</textarea>

    <label>Current Image</label><br>
    {% if student.Image %}
        <img src="{{ student.Image.url }}" width="100">
    {% else %}
        <img src="/media/images/default.png" width="100">
    {% endif %}

    <!-- ✅ THIS WAS MISSING -->
    <label>Change Image</label>
    <input type="file" name="Image">

    <button type="submit">Update</button>
</form>

    <a href="{% url 'student_list' %}" class="view-link">Back to Student List</a>
</div>

</body>
</html>
