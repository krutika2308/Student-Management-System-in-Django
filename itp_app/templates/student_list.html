{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="{% static 'css/studentlist.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar_page.css' %}">

    <title>Student List</title>
</head>
<body>

{% include "navbar.html" %}

<!-- 🔍 Search Box -->
<div class="search-box">
    <form method="GET">
        <input type="search" name="search" placeholder="Search student..." value="{{ request.GET.search }}">
        <button type="submit">Search</button>
    </form>
</div>

<!-- 🧾 Cards -->
<div id="cardsDiv">
    {% for s in student %}
    <div class="card">

        <img src="{{ s.Image.url }}" alt="">

        <h3>{{ s.name }}</h3>
        <p>Age: {{ s.age }}</p>

        <div class="btns">
            <button>
                <a href="{% url 'update_student' s.id %}">UPDATE</a>
            </button>
            <button>
                <a href="{% url 'delete' s.id %}">DELETE</a>
            </button>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
